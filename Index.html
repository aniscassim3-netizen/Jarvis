<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JARVIS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#00b4ff;font-family:'Share Tech Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(#00b4ff06 1px,transparent 1px),linear-gradient(90deg,#00b4ff06 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
#app{position:relative;z-index:2;display:flex;flex-direction:column;height:100vh}

/* HEADER */
#header{padding:8px 16px;border-bottom:1px solid #00b4ff22;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo h1{font-size:15px;letter-spacing:6px;color:#00b4ff;text-shadow:0 0 20px #00b4ff}
.logo span{font-size:8px;color:#00b4ff44;letter-spacing:2px}
#datetime{text-align:right;font-size:9px;color:#00b4ff55;letter-spacing:1px;line-height:1.6}

/* ORB AREA */
#orbarea{display:flex;flex-direction:column;align-items:center;padding:16px 0 8px;flex-shrink:0;position:relative}
#orb{width:110px;height:110px;border-radius:50%;position:relative;cursor:pointer}
#orb .core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#80d8ff,#0080cc 50%,#001833 80%);box-shadow:0 0 40px #00b4ff,0 0 80px #0080cc66;animation:breathe 3s ease-in-out infinite}
#orb .core::before{content:'';position:absolute;top:16%;left:20%;width:26%;height:16%;background:rgba(255,255,255,0.4);border-radius:50%;filter:blur(3px)}
#orb .r1{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;border:1px solid #00b4ff44;animation:sp1 5s linear infinite}
#orb .r1::before{content:'';position:absolute;top:-3px;left:40%;width:5px;height:5px;background:#00b4ff;border-radius:50%;box-shadow:0 0 10px #00b4ff}
#orb .r2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;border-radius:50%;border:1px solid #00b4ff22;animation:sp2 9s linear infinite}
#orb .r2::before{content:'';position:absolute;bottom:-2px;right:18%;width:3px;height:3px;background:#00b4ffaa;border-radius:50%}
@keyframes breathe{0%,100%{box-shadow:0 0 40px #00b4ff,0 0 80px #0080cc66;transform:translate(-50%,-50%) scale(1)}50%{box-shadow:0 0 60px #00b4ff,0 0 120px #0080cc99;transform:translate(-50%,-50%) scale(1.07)}}
@keyframes sp1{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes sp2{to{transform:translate(-50%,-50%) rotate(-360deg)}}
#orb.listening .core{animation:listen 0.6s ease-in-out infinite}
@keyframes listen{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 40px #00b4ff}50%{transform:translate(-50%,-50%) scale(1.18);box-shadow:0 0 100px #00b4ff,0 0 200px #0080cc}}
#orb.thinking .core{animation:think 0.4s ease-in-out infinite}
@keyframes think{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.1);box-shadow:0 0 80px #00ffcc,0 0 150px #00b4ff}}

#orbstatus{font-size:9px;letter-spacing:4px;margin-top:8px;color:#00b4ff66;transition:all 0.3s}
#orbstatus.active{color:#00b4ff;text-shadow:0 0 10px #00b4ff;animation:pulse-text 1s infinite}
@keyframes pulse-text{0%,100%{opacity:1}50%{opacity:0.4}}

/* CLAP HINT */
#hint{font-size:9px;color:#00b4ff33;letter-spacing:2px;margin-top:4px}

/* WAVE VISUALIZER */
#waves{display:flex;align-items:center;justify-content:center;gap:3px;height:24px;margin-top:6px}
.wave{width:3px;background:#00b4ff;border-radius:2px;height:4px;transition:height 0.1s}
#waves.active .wave:nth-child(1){animation:w1 0.6s ease infinite}
#waves.active .wave:nth-child(2){animation:w1 0.5s ease infinite 0.1s}
#waves.active .wave:nth-child(3){animation:w1 0.7s ease infinite 0.05s}
#waves.active .wave:nth-child(4){animation:w1 0.5s ease infinite 0.15s}
#waves.active .wave:nth-child(5){animation:w1 0.6s ease infinite 0.08s}
@keyframes w1{0%,100%{height:4px}50%{height:20px}}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:8px}
#chat::-webkit-scrollbar{width:2px}
#chat::-webkit-scrollbar-thumb{background:#00b4ff22}
.umsg{background:#00b4ff0a;border:1px solid #00b4ff33;border-left:3px solid #00b4ff;padding:8px 12px;align-self:flex-end;max-width:88%;font-size:13px;color:#e0f4ff;line-height:1.5}
.jmsg{background:#001222;border:1px solid #00b4ff22;border-left:3px solid #0060aa;padding:8px 12px;align-self:flex-start;max-width:92%;font-size:13px;color:#00b4ff;line-height:1.7}
.jlabel{color:#00b4ff44;font-size:9px;display:block;margin-bottom:3px;letter-spacing:2px}
#typing{color:#00b4ff44;font-size:11px;padding:2px 16px;display:none;letter-spacing:3px;flex-shrink:0}

/* BOTTOM */
#bottom{padding:10px 16px;border-top:1px solid #00b4ff22;display:flex;gap:8px;flex-shrink:0;background:#00000099;align-items:center}
#inp{flex:1;background:#000d1a;border:1px solid #00b4ff33;color:#00b4ff;padding:10px 12px;font-size:13px;font-family:'Share Tech Mono',monospace;letter-spacing:1px}
#inp:focus{outline:none;border-color:#00b4ff;box-shadow:0 0 12px #00b4ff22}
#inp::placeholder{color:#00b4ff33}
#sendbtn{background:transparent;border:1px solid #00b4ff55;color:#00b4ff;padding:10px 14px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;transition:all 0.2s;white-space:nowrap}
#sendbtn:active{background:#00b4ff11}
#micbtn{background:transparent;border:1px solid #00b4ff33;color:#00b4ff66;padding:10px 12px;cursor:pointer;font-size:16px;transition:all 0.2s;flex-shrink:0}
#micbtn.on{border-color:#00b4ff;color:#00b4ff;box-shadow:0 0 15px #00b4ff44}

/* STATUS BAR */
#statusbar{display:flex;justify-content:space-between;padding:4px 16px;border-bottom:1px solid #00b4ff11;font-size:8px;color:#00b4ff33;letter-spacing:1px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">

<div id="header">
<div class="logo">
<h1>J.A.R.V.I.S</h1>
<span>JUST A RATHER VERY INTELLIGENT SYSTEM</span>
</div>
<div id="datetime"></div>
</div>

<div id="statusbar">
<span id="sb1">MODEL: LLAMA-3.3-70B</span>
<span id="sb2">STATUS: ONLINE</span>
<span id="sb3">MEM: 0 MSG</span>
</div>

<div id="orbarea">
<div id="orb" onclick="toggleListen()">
<div class="r2"></div>
<div class="r1"></div>
<div class="core"></div>
</div>
<div id="orbstatus">TAP ORB OR CLAP TO SPEAK</div>
<div id="hint">// OR TYPE BELOW</div>
<div id="waves">
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>
</div>
</div>

<div id="chat">
<div class="jmsg"><span class="jlabel">JARVIS SYSTEM BOOT</span>All systems online. Tap the orb, clap twice, or type to talk to me boss.</div>
</div>

<div id="typing">▋ PROCESSING...</div>

<div id="bottom">
<input id="inp" placeholder="> ENTER COMMAND..." onkeydown="if(event.key==='Enter')send()"/>
<button id="micbtn" onclick="toggleListen()" title="Voice">🎤</button>
<button id="sendbtn" onclick="send()">SEND</button>
</div>

</div>

<script>
const GROQ_KEY = "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";
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const MODEL = "llama-3.3-70b-versatile";

let memory = [{
  role:"system",
  content:`You are Jarvis, a personal AI assistant and business partner. You are smart, loyal, witty and direct. You help your boss build businesses, make money and solve problems. Current date: ${new Date().toDateString()}. Keep responses clear and useful. When asked something conversational, be natural. When asked for business help, be practical.`
}];

// DATETIME
function updateTime(){
  const n = new Date();
  document.getElementById('datetime').innerHTML =
    n.toLocaleDateString('en-ZA',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})+'<br>'+
    n.toLocaleTimeString('en-ZA');
}
setInterval(updateTime,1000);
updateTime();

// CLAP DETECTION
let audioCtx, analyser, clapTimeout, lastClap=0, clapCount=0;

async function startClapDetection(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize=256;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    function detect(){
      analyser.getByteFrequencyData(data);
      const vol = data.reduce((a,b)=>a+b)/data.length;
      if(vol>45){
        const now = Date.now();
        if(now-lastClap>100 && now-lastClap<800){
          clapCount++;
          if(clapCount>=2){
            clapCount=0;
            toggleListen();
          }
        } else if(now-lastClap>=800){
          clapCount=1;
        }
        lastClap=now;
      }
      requestAnimationFrame(detect);
    }
    detect();
  }catch(e){
    console.log('Mic not available for clap detection');
  }
}
startClapDetection();

// VOICE RECOGNITION
let recognition, listening=false;
const SpeechRecognition = window.SpeechRecognition||window.webkitSpeechRecognition;

function toggleListen(){
  if(!SpeechRecognition){
    addMsg('jarvis','Voice recognition not supported in this browser boss. Use Chrome.');
    return;
  }
  if(listening){
    stopListen();
  } else {
    startListen();
  }
}

function startListen(){
  recognition = new SpeechRecognition();
  recognition.lang='en-ZA';
  recognition.continuous=false;
  recognition.interimResults=false;

  recognition.onstart=()=>{
    listening=true;
    setOrbState('listening');
    document.getElementById('micbtn').classList.add('on');
    document.getElementById('waves').classList.add('active');
  };

  recognition.onresult=(e)=>{
    const text = e.results[0][0].transcript;
    document.getElementById('inp').value=text;
    send();
  };

  recognition.onend=()=>{
    listening=false;
    setOrbState('idle');
    document.getElementById('micbtn').classList.remove('on');
    document.getElementById('waves').classList.remove('active');
  };

  recognition.onerror=()=>{
    listening=false;
    setOrbState('idle');
    document.getElementById('micbtn').classList.remove('on');
    document.getElementById('waves').classList.remove('active');
  };

  recognition.start();
}

function stopListen(){
  if(recognition) recognition.stop();
}

// ORB STATES
function setOrbState(state){
  const orb = document.getElementById('orb');
  const status = document.getElementById('orbstatus');
  orb.className='';
  if(state==='listening'){
    orb.classList.add('listening');
    status.textContent='LISTENING...';
    status.classList.add('active');
    document.getElementById('sb2').textContent='STATUS: LISTENING';
  } else if(state==='thinking'){
    orb.classList.add('thinking');
    status.textContent='PROCESSING...';
    status.classList.add('active');
    document.getElementById('sb2').textContent='STATUS: THINKING';
  } else {
    status.textContent='TAP ORB OR CLAP TO SPEAK';
    status.classList.remove('active');
    document.getElementById('sb2').textContent='STATUS: ONLINE';
  }
}

// TEXT TO SPEECH
function speak(text){
  const clean = text.replace(/<[^>]*>/g,'').substring(0,300);
  const u = new SpeechSynthesisUtterance(clean);
  u.rate=1;
  u.pitch=0.85;
  u.volume=1;
  const voices = speechSynthesis.getVoices();
  const male = voices.find(v=>v.name.toLowerCase().includes('male')||v.name.includes('Daniel')||v.name.includes('Google UK English Male'));
  if(male) u.voice=male;
  speechSynthesis.speak(u);
}

// CHAT
const chat = document.getElementById('chat');
const inp = document.getElementById('inp');
const typing = document.getElementById('typing');

function addMsg(role, text){
  if(role==='user'){
    chat.innerHTML+=`<div class="umsg">${text}</div>`;
  } else {
    chat.innerHTML+=`<div class="jmsg"><span class="jlabel">JARVIS</span>${text.replace(/\n/g,'<br>')}</div>`;
  }
  chat.scrollTop=chat.scrollHeight;
}

async function send(){
  const t = inp.value.trim();
  if(!t) return;
  inp.value='';
  addMsg('user',t);
  typing.style.display='block';
  setOrbState('thinking');
  memory.push({role:"user",content:t});
  document.getElementById('sb3').textContent=`MEM: ${memory.length} MSG`;
  try{
    const r = await fetch(GROQ_URL,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${GROQ_KEY}`
      },
      body:JSON.stringify({model:MODEL,messages:memory,max_tokens:1000})
    });
    const d = await r.json();
    const reply = d.choices[0].message.content;
    memory.push({role:"assistant",content:reply});
    typing.style.display='none';
    setOrbState('idle');
    addMsg('jarvis',reply);
    speak(reply);
    document.getElementById('sb3').textContent=`MEM: ${memory.length} MSG`;
  }catch(e){
    typing.style.display='none';
    setOrbState('idle');
    addMsg('jarvis','Connection error boss. Check your Groq key.');
  }
}
</script>
</body>
</html>
